<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Plataforma de Câmbio Global</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                        "brand-primary": "#0A2A5B",
                        "brand-secondary": "#17A2B8",
                        "brand-success": "#28A745",
                        "brand-danger": "#DC3545",
                        "brand-light": "#F5F7FA"
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24
        }
    </style>
</head>
<body>
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden font-display" style='font-family: Manrope, "Noto Sans", sans-serif;'>
<div class="layout-container flex h-full grow flex-col">
<div class="px-4 md:px-10 lg:px-20 flex flex-1 justify-center items-center py-10">
<div class="layout-content-container flex flex-col w-full max-w-md flex-1">
<div class="text-center mb-8">
<h1 class="text-black dark:text-white tracking-light text-3xl font-bold leading-tight">Sua plataforma global de câmbio</h1>
<p class="text-zinc-600 dark:text-zinc-400 text-base font-normal leading-normal pt-2">
                          Segurança e agilidade para suas transações internacionais.
                        </p>
</div>
<div class="bg-white dark:bg-zinc-900/50 p-2 sm:p-4 rounded-xl shadow-lg border border-zinc-200 dark:border-zinc-800">
<div class="flex p-1">
<div class="flex h-12 flex-1 items-center justify-center rounded-lg bg-zinc-100 dark:bg-background-dark p-1">
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 has-[:checked]:bg-white dark:has-[:checked]:bg-zinc-700 has-[:checked]:shadow-sm has-[:checked]:text-black dark:has-[:checked]:text-white text-zinc-500 dark:text-zinc-400 text-sm font-medium leading-normal transition-colors duration-200">
<span class="truncate">Entrar</span>
<input checked="" class="invisible w-0" name="auth-toggle" type="radio" value="Sign In"/>
</label>
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 has-[:checked]:bg-white dark:has-[:checked]:bg-zinc-700 has-[:checked]:shadow-sm has-[:checked]:text-black dark:has-[:checked]:text-white text-zinc-500 dark:text-zinc-400 text-sm font-medium leading-normal transition-colors duration-200">
<span class="truncate">Criar Conta</span>
<input class="invisible w-0" name="auth-toggle" type="radio" value="Create Account"/>
</label>
</div>
</div>
<div class="p-2 sm:p-4">
<h2 class="text-black dark:text-white text-2xl font-bold leading-tight tracking-[-0.015em] pb-2">Bem-vindo de volta!</h2>
<div class="flex flex-col gap-4 py-3">
<label class="flex flex-col w-full">
<p class="text-black dark:text-white text-sm font-medium leading-normal pb-2">E-mail ou Usuário</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-black dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-zinc-300 dark:border-zinc-700 bg-zinc-50 dark:bg-zinc-800 focus:border-primary h-12 placeholder:text-zinc-400 dark:placeholder:text-zinc-500 px-3 text-base font-normal leading-normal" placeholder="Digite seu e-mail ou usuário" value=""/>
</label>
<label class="flex flex-col w-full">
<div class="flex justify-between items-center pb-2">
<p class="text-black dark:text-white text-sm font-medium leading-normal">Senha</p>
<a class="text-primary text-sm font-medium hover:underline" href="#">Esqueceu a senha?</a>
</div>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-black dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-zinc-300 dark:border-zinc-700 bg-zinc-50 dark:bg-zinc-800 focus:border-primary h-12 placeholder:text-zinc-400 dark:placeholder:text-zinc-500 px-3 text-base font-normal leading-normal" placeholder="Digite sua senha" type="password" value=""/>
</label>
</div>
<div class="pt-4">
<button class="flex items-center justify-center text-center font-medium text-base rounded-lg px-6 py-3 w-full bg-primary text-white hover:bg-primary/90 transition-colors duration-200 h-12">Entrar</button>
</div>
<div class="relative flex items-center py-6">
<div class="flex-grow border-t border-zinc-200 dark:border-zinc-700"></div>
<span class="flex-shrink mx-4 text-zinc-400 dark:text-zinc-500 text-xs">OU</span>
<div class="flex-grow border-t border-zinc-200 dark:border-zinc-700"></div>
</div>
<div class="flex flex-col sm:flex-row gap-4">
<button class="flex-1 flex items-center justify-center gap-2 border border-zinc-300 dark:border-zinc-700 bg-white dark:bg-zinc-800/50 hover:bg-zinc-50 dark:hover:bg-zinc-800 text-black dark:text-white font-medium text-sm rounded-lg px-4 py-2 h-12 transition-colors duration-200">
<img alt="Google logo" class="w-5 h-5" data-alt="Google logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDbivzfGUs6ohqkcpQ6wg-mII7ebZ7Cmg3qcSGuqCRpGDydvMCs7h1MNuBDVwg_xT_nxxNv_M0M_JN8V1UPmjrbk3Q5sTHQTf7ecYoHVAytVYYxnH3-zjjSLKIXXHA8qiPcp6H5CdMOzcuZHsy6iq7LuLuo4-YfUrURG2MeIG82g8mRr2nKCLRYicgSZxv8mdvxPbJO4jg8n2E6922LNBerldDUlDp2K0ZKF5D-IcrGojvuSznDtz5C0evE7aEUjMyOWIuYjythNYI"/>
<span>Entrar com Google</span>
</button>
<button class="flex-1 flex items-center justify-center gap-2 border border-zinc-300 dark:border-zinc-700 bg-white dark:bg-zinc-800/50 hover:bg-zinc-50 dark:hover:bg-zinc-800 text-black dark:text-white font-medium text-sm rounded-lg px-4 py-2 h-12 transition-colors duration-200">
<img alt="Apple logo" class="w-5 h-5" data-alt="Apple logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBMG5l68x0rCdHMQDg_rM_FuUY5PDwQnuzNz3mo0yPslpCUDEkhSiLExK5u8SuEF1Wi9tlspwzaZ3rMUAq8BtYG-hvkOffmDc5HX8IOT6ZYgEukgmjuvInJBJFZTIo66Z6tXHjacjuOGmvrMMbMFAm4_2VeJoMN1fmZU3NQq5w8QkkAfJkG6AgB555qWEWwzLVInyrF206knohaQwqhDJITRrwTb1OLhR-qTgRwl2J4N6EsZVgscPoE2aZDRB7k-1Oz9UpRpjxST2s"/>
<span>Entrar com Apple</span>
</button>
</div>
</div>
</div>
<div class="mt-8 flex flex-col items-center justify-center gap-4 rounded-xl border border-brand-secondary/30 bg-primary/10 dark:bg-primary/10 p-4">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-brand-secondary text-2xl" data-icon="shield_lock">shield</span>
<h3 class="text-black dark:text-white text-base font-bold">Sua Segurança é a Nossa Prioridade</h3>
</div>
<p class="text-zinc-700 dark:text-zinc-300 text-sm font-normal leading-normal text-center">
                            Usamos criptografia de ponta a ponta e autenticação de dois fatores (2FA) para proteger sua conta e suas transações.
                        </p>
</div>
</div>
</div>
</div>
</div>
</body></html>
